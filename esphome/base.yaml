substitutions:
  device_name: "birdnet_audio_sensor"
  friendly_name: "BirdNet Audio Sensor"
  board: esp32-s3-devkitc-1
  variant: esp32s3
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.9.0
  name_add_mac_suffix: false

esp32:
  board: ${board}
  variant: ${variant}
  framework:
    type: esp-idf
    version: recommended

psram:
  mode: quad
  speed: 80MHz

web_server:
  port: 80

# Enable logging
logger:
  level: DEBUG
  logs:
    light: INFO
    sensor: INFO

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  power_save_mode: none
  on_connect:
    - logger.log: "WiFi connected!"
    - logger.log: "Starting microphone capture"
    - microphone.capture: mic
  on_disconnect:
    - logger.log: "WiFi disconnected!"
    - logger.log: "Stopping microphone capture"
    - microphone.stop_capture: mic

globals:
  - id: udp_target_ip
    type: std::string
    restore_value: true
    initial_value: '""'
  - id: udp_target_port
    type: int
    restore_value: true
    initial_value: '5000'
  - id: mic_gain
    type: int
    restore_value: true
    initial_value: '8'

text:
  - platform: template
    name: "Audio Target IP"
    id: udp_target_ip_input
    optimistic: true
    restore_value: true
    initial_value: ""
    mode: text
    entity_category: config
    on_value:
      - globals.set:
          id: udp_target_ip
          value: !lambda 'return x;'

number:
  - platform: template
    name: "UDP Target Port"
    id: udp_target_port_input
    optimistic: true
    restore_value: true
    initial_value: 5000
    min_value: 1
    max_value: 65535
    step: 1
    mode: box
    entity_category: config
    on_value:
      - globals.set:
          id: udp_target_port
          value: !lambda 'return (int)x;'

  - platform: template
    name: "Mic Gain"
    id: mic_gain_input
    optimistic: true
    restore_value: true
    initial_value: 1
    min_value: 1
    max_value: 32
    step: 1
    mode: slider
    entity_category: config
    icon: "mdi:volume-high"
    on_value:
      - globals.set:
          id: mic_gain
          value: !lambda 'return (int)x;'

binary_sensor:
  - platform: status
    name: status

light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO21
    num_leds: 1
    chipset: WS2812
    name: "Status LED"
    id: rgb_light
    restore_mode: ALWAYS_OFF

sensor:
  - platform: wifi_signal # Reports the WiFi signal strength/RSSI in dB
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"

  - platform: sound_level
    microphone: mic
    passive: true
    peak:
      name: "Peak Loudness"
    rms:
      name: "Average Loudness"

  - platform: uptime
    name: "ESP Uptime"
    id: uptime_sensor
    entity_category: "diagnostic"

button:
  - platform: restart
    name: "Restart"

i2s_audio:
  - id: i2s_in
    i2s_lrclk_pin: GPIO5   # WS/LRCL  - free GPIO, adjust to match your wiring
    i2s_bclk_pin: GPIO4    # SCK/BCLK - free GPIO, adjust to match your wiring

microphone:
  - platform: i2s_audio
    id: mic
    adc_type: external
    i2s_mode: primary
    i2s_din_pin: GPIO6     # SD/DOUT  - free GPIO, adjust to match your wiring
    i2s_audio_id: i2s_in
    sample_rate: 48000
    bits_per_channel: 32bit
    bits_per_sample: 16bit
    channel: left
    pdm: false
    use_apll: true
    on_data:
      - lambda: |-
          static int sock = -1;
          static struct sockaddr_in dest = {};
          static std::string last_ip = "";
          static int last_port = -1;
          static uint16_t rtp_seq = 0;
          static uint32_t rtp_ts = 0;
          static uint32_t ssrc = 0;
          static bool initialized = false;
          // Accumulator for samples across callbacks (handles non-aligned DMA chunks)
          static int16_t mono_buf[4096];
          static size_t mono_buf_len = 0;

          if (!initialized) {
            ssrc = esp_random();
            rtp_seq = (uint16_t)(esp_random() & 0xFFFF);
            initialized = true;
          }

          // Guard: skip if IP is empty or unset
          std::string ip = id(udp_target_ip);
          int port = id(udp_target_port);
          if (ip.empty() || ip == "0" || ip == "0.0.0.0") return;
          if (port <= 0 || port > 65535) return;

          // Close and reopen socket if IP or port has changed
          if ((ip != last_ip || port != last_port) && sock >= 0) {
            ESP_LOGI("rtp", "Target changed from %s:%d to %s:%d, reopening socket",
                     last_ip.c_str(), last_port, ip.c_str(), port);
            ::close(sock);
            sock = -1;
          }

          // (Re)initialize socket if needed
          if (sock < 0) {
            sock = ::socket(AF_INET, SOCK_DGRAM, IPPROTO_UDP);
            if (sock < 0) return;
            int sndbuf = 65536;
            ::setsockopt(sock, SOL_SOCKET, SO_SNDBUF, &sndbuf, sizeof(sndbuf));
            last_ip = ip;
            last_port = port;
            ESP_LOGI("rtp", "Opened UDP socket, sending RTP to %s:%d (SSRC=0x%08X)",
                     ip.c_str(), port, ssrc);
          }

          // Update destination
          dest.sin_family = AF_INET;
          dest.sin_port = htons((uint16_t)port);
          if (::inet_pton(AF_INET, ip.c_str(), &dest.sin_addr) != 1) return;

          // Extract mono (left channel) from interleaved stereo 16-bit samples
          const int16_t *stereo = reinterpret_cast<const int16_t *>(x.data());
          size_t total_stereo_samples = x.size() / sizeof(int16_t);
          for (size_t i = 0; i < total_stereo_samples; i += 2) {
            if (mono_buf_len < sizeof(mono_buf) / sizeof(mono_buf[0])) {
              mono_buf[mono_buf_len++] = stereo[i];
            }
          }

          // Send complete RTP packets: 12-byte header + 720 L16 samples (1440 bytes)
          // 720 samples @ 24kHz = 30ms per packet, 1452 bytes total (under MTU 1500)
          const size_t SAMPLES_PER_PACKET = 720;
          uint8_t packet[12 + SAMPLES_PER_PACKET * 2];

          while (mono_buf_len >= SAMPLES_PER_PACKET) {
            // RTP header (RFC 3550)
            packet[0] = 0x80;  // V=2, P=0, X=0, CC=0
            packet[1] = 96;    // PT=96 (dynamic), M=0
            packet[2] = (uint8_t)(rtp_seq >> 8);
            packet[3] = (uint8_t)(rtp_seq & 0xFF);
            uint32_t ts_n = htonl(rtp_ts);
            memcpy(&packet[4], &ts_n, 4);
            uint32_t ssrc_n = htonl(ssrc);
            memcpy(&packet[8], &ssrc_n, 4);

            // Payload: L16 big-endian mono samples with digital gain
            int16_t *payload = reinterpret_cast<int16_t *>(&packet[12]);
            const int GAIN = id(mic_gain);
            for (size_t i = 0; i < SAMPLES_PER_PACKET; i++) {
              int32_t amplified = (int32_t)mono_buf[i] * GAIN;
              if (amplified > 32767) amplified = 32767;
              else if (amplified < -32768) amplified = -32768;
              payload[i] = (int16_t)__builtin_bswap16((uint16_t)(int16_t)amplified);
            }

            ::sendto(sock, packet, sizeof(packet), MSG_DONTWAIT,
                     (struct sockaddr *)&dest, sizeof(dest));

            rtp_seq++;
            rtp_ts += SAMPLES_PER_PACKET;

            // Shift remaining samples to front of accumulator
            mono_buf_len -= SAMPLES_PER_PACKET;
            if (mono_buf_len > 0) {
              memmove(mono_buf, &mono_buf[SAMPLES_PER_PACKET],
                      mono_buf_len * sizeof(int16_t));
            }
          }