esphome:
  name: esphome-dev-1
  friendly_name: ESPHome Dev Device
  min_version: 2025.9.0
  name_add_mac_suffix: false

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    version: recommended

psram:
  mode: quad
  speed: 80MHz

web_server:
  port: 80

# Enable logging
logger:
  level: DEBUG
  logs:
    light: INFO
    sensor: INFO

# Enable Home Assistant API
api:
  encryption:
    key: "<your encryption key>"

# Allow Over-The-Air updates
ota:
  - platform: esphome
    password: "<your ota password>"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  on_connect:
    - logger.log: "WiFi connected!"
    - logger.log: "Starting microphone capture"
    - microphone.capture: mic
  on_disconnect:
    - logger.log: "WiFi disconnected!"
    - logger.log: "Stopping microphone capture"
    - microphone.stop_capture: mic

globals:
  - id: udp_target_ip
    type: std::string
    restore_value: true
    initial_value: '""'
  - id: udp_target_port
    type: int
    restore_value: true
    initial_value: '5000'

text:
  - platform: template
    name: "Audio Target IP"
    id: udp_target_ip_input
    optimistic: true
    restore_value: true
    initial_value: ""
    mode: text
    entity_category: config
    on_value:
      - globals.set:
          id: udp_target_ip
          value: !lambda 'return x;'

number:
  - platform: template
    name: "UDP Target Port"
    id: udp_target_port_input
    optimistic: true
    restore_value: true
    initial_value: 5000
    min_value: 1
    max_value: 65535
    step: 1
    mode: box
    entity_category: config
    on_value:
      - globals.set:
          id: udp_target_port
          value: !lambda 'return (int)x;'

binary_sensor:
  - platform: status
    name: status

light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO21
    num_leds: 1
    chipset: WS2812
    name: "Status LED"
    id: rgb_light
    restore_mode: ALWAYS_OFF

sensor:
  - platform: wifi_signal # Reports the WiFi signal strength/RSSI in dB
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"

  - platform: sound_level
    microphone: mic
    passive: true
    peak:
      name: "Peak Loudness"
    rms:
      name: "Average Loudness"

  - platform: uptime
    name: "ESP Uptime"
    id: uptime_sensor
    entity_category: "diagnostic"

button:
  - platform: restart
    name: "Restart"

i2s_audio:
  - id: i2s_in
    i2s_lrclk_pin: GPIO5   # WS/LRCL  - free GPIO, adjust to match your wiring
    i2s_bclk_pin: GPIO4    # SCK/BCLK - free GPIO, adjust to match your wiring

microphone:
  - platform: i2s_audio
    id: mic
    adc_type: external
    i2s_mode: primary
    i2s_din_pin: GPIO6     # SD/DOUT  - free GPIO, adjust to match your wiring
    i2s_audio_id: i2s_in
    sample_rate: 48000
    bits_per_channel: 32bit
    bits_per_sample: 32bit
    channel: left
    pdm: false
    use_apll: true
    on_data:
      - lambda: |-
          static int sock = -1;
          static struct sockaddr_in dest = {};
          static std::string last_ip = "";
          static int last_port = -1;

          // Guard: skip if IP is empty or unset
          std::string ip = id(udp_target_ip);
          int port = id(udp_target_port);
          if (ip.empty() || ip == "0" || ip == "0.0.0.0") return;
          if (port <= 0 || port > 65535) return;

          // Close and reopen socket if IP or port has changed
          if ((ip != last_ip || port != last_port) && sock >= 0) {
            ESP_LOGI("udp", "Target changed from %s:%d to %s:%d, reopening socket",
                     last_ip.c_str(), last_port, ip.c_str(), port);
            ::close(sock);
            sock = -1;
          }

          // (Re)initialize socket if needed
          if (sock < 0) {
            sock = ::socket(AF_INET, SOCK_DGRAM, IPPROTO_UDP);
            if (sock < 0) return;
            int broadcast = 1;
            ::setsockopt(sock, SOL_SOCKET, SO_BROADCAST, &broadcast, sizeof(broadcast));
            int sndbuf = 65536;
            ::setsockopt(sock, SOL_SOCKET, SO_SNDBUF, &sndbuf, sizeof(sndbuf));
            last_ip = ip;
            last_port = port;
            ESP_LOGI("udp", "Opened UDP socket, sending to %s:%d", ip.c_str(), port);
          }

          // Update destination
          dest.sin_family = AF_INET;
          dest.sin_port = htons((uint16_t)port);
          if (::inet_pton(AF_INET, ip.c_str(), &dest.sin_addr) != 1) return;

          // Send raw stereo data directly — no processing in this time-critical
          // callback. Channel extraction is done by ffmpeg on the Pi.
          // Split into chunks <= 1400 bytes to avoid IP fragmentation (MTU 1500).
          const size_t MAX_CHUNK = 1400;
          const uint8_t* ptr = x.data();
          size_t remaining = x.size();
          while (remaining > 0) {
            size_t chunk = remaining < MAX_CHUNK ? remaining : MAX_CHUNK;
            ::sendto(sock, ptr, chunk, MSG_DONTWAIT,
                     (struct sockaddr*)&dest, sizeof(dest));
            ptr += chunk;
            remaining -= chunk;
          }